<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Hello</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 420px;
      width: 100%;
      padding: 32px;
      backdrop-filter: blur(12px);
    }
    h1 {
      margin-top: 0;
      font-size: 2.4rem;
    }
    p {
      margin: 12px 0;
      line-height: 1.6;
    }
    .weather {
      margin-top: 24px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    button {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 1rem;
      cursor: pointer;
      background: #ffffff;
      color: #2193b0;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      background: #f1f1f1;
    }
    .error {
      color: #ffe4e1;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello Frank Shen</h1>
    <p>Welcome to your weather page. Click the button below to show the current weather in Shanghai, China.</p>
    <button id="refreshBtn">Show Shanghai Weather</button>
    <div id="weather" class="weather">
      <p>Weather information will appear here when you request Shanghai weather.</p>
    </div>
    <div id="error" class="error"></div>
  </div>

  <script>
    const weatherEl = document.getElementById('weather');
    const errorEl = document.getElementById('error');
    const button = document.getElementById('refreshBtn');

    function weatherCodeToText(code) {
      const map = {
        0: 'Clear sky',
        1: 'Mainly clear',
        2: 'Partly cloudy',
        3: 'Overcast',
        45: 'Fog',
        48: 'Depositing rime fog',
        51: 'Light drizzle',
        53: 'Moderate drizzle',
        55: 'Dense drizzle',
        56: 'Light freezing drizzle',
        57: 'Dense freezing drizzle',
        61: 'Slight rain',
        63: 'Moderate rain',
        65: 'Heavy rain',
        66: 'Light freezing rain',
        67: 'Heavy freezing rain',
        71: 'Slight snow fall',
        73: 'Moderate snow fall',
        75: 'Heavy snow fall',
        77: 'Snow grains',
        80: 'Slight rain showers',
        81: 'Moderate rain showers',
        82: 'Violent rain showers',
        85: 'Slight snow showers',
        86: 'Heavy snow showers',
        95: 'Thunderstorm',
        96: 'Thunderstorm with slight hail',
        99: 'Thunderstorm with heavy hail'
      };
      return map[code] || 'Unknown';
    }

    function degToCompass(num) {
      const val = Math.floor((num / 22.5) + 0.5);
      const arr = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return arr[(val % 16)];
    }

    async function showWeather() {
      errorEl.textContent = '';
      weatherEl.innerHTML = '<p>Getting Shanghai weather...</p>';

      const latitude = 31.2304;
      const longitude = 121.4737;
      const city = 'Shanghai, China';

      const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=relativehumidity_2m,pressure_msl,precipitation&daily=sunrise,sunset&temperature_unit=celsius&timezone=Asia%2FShanghai`;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error('Weather service responded with an error.');
        }
        const data = await response.json();
        const cw = data.current_weather;
        if (!cw) {
          throw new Error('No current weather data available.');
        }

        const time = cw.time;
        let humidity = 'N/A', pressure = 'N/A', precipitation = 'N/A';
        if (data.hourly && Array.isArray(data.hourly.time)) {
          const idx = data.hourly.time.indexOf(time);
          if (idx !== -1) {
            humidity = data.hourly.relativehumidity_2m ? data.hourly.relativehumidity_2m[idx] : 'N/A';
            pressure = data.hourly.pressure_msl ? data.hourly.pressure_msl[idx] : 'N/A';
            precipitation = data.hourly.precipitation ? data.hourly.precipitation[idx] : 'N/A';
          }
        }

        const sunrise = data.daily && data.daily.sunrise ? data.daily.sunrise[0] : 'N/A';
        const sunset = data.daily && data.daily.sunset ? data.daily.sunset[0] : 'N/A';

        const greeting = `Hello! Current weather in ${city}:`;
        const details = `<strong>Temperature:</strong> ${cw.temperature.toFixed(1)}°C<br>` +
          `<strong>Wind:</strong> ${cw.windspeed.toFixed(1)} km/h (${degToCompass(cw.winddirection)} ${cw.winddirection}°)<br>` +
          `<strong>Humidity:</strong> ${humidity !== 'N/A' ? humidity + '%' : 'N/A'}<br>` +
          `<strong>Pressure:</strong> ${pressure !== 'N/A' ? pressure + ' hPa' : 'N/A'}<br>` +
          `<strong>Precipitation (1h):</strong> ${precipitation !== 'N/A' ? precipitation + ' mm' : 'N/A'}<br>` +
          `<strong>Conditions:</strong> ${weatherCodeToText(cw.weathercode)}<br>` +
          `<strong>Time:</strong> ${cw.time}<br>` +
          `<strong>Sunrise:</strong> ${sunrise}<br>` +
          `<strong>Sunset:</strong> ${sunset}`;

        weatherEl.innerHTML = `<p>${greeting}</p><p>${details}</p>`;
      } catch (err) {
        errorEl.textContent = err.message;
        weatherEl.innerHTML = '<p>Could not load weather data. Please try again later.</p>';
      }
    }

    button.addEventListener('click', showWeather);
  </script>
</body>
</html>

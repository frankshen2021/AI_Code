<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Hello</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 420px;
      width: 100%;
      padding: 32px;
      backdrop-filter: blur(12px);
    }
    h1 {
      margin-top: 0;
      font-size: 2.4rem;
    }
    p {
      margin: 12px 0;
      line-height: 1.6;
    }
    .weather {
      margin-top: 24px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    button {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 1rem;
      cursor: pointer;
      background: #ffffff;
      color: #2193b0;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      background: #f1f1f1;
    }
    .error {
      color: #ffe4e1;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello!</h1>
    <p>Welcome to your weather page. Click the button below to show the current weather for your location.</p>
    <button id="refreshBtn">Show Current Weather</button>
    <div id="weather" class="weather">
      <p>Weather information will appear here once you allow location access.</p>
    </div>
    <div id="error" class="error"></div>
  </div>

  <script>
    const weatherEl = document.getElementById('weather');
    const errorEl = document.getElementById('error');
    const button = document.getElementById('refreshBtn');

    async function showWeather() {
      errorEl.textContent = '';
      weatherEl.innerHTML = '<p>Getting location and weather...</p>';

      if (!navigator.geolocation) {
        errorEl.textContent = 'Geolocation is not supported by your browser.';
        weatherEl.innerHTML = '<p>Unable to get weather without location access.</p>';
        return;
      }

      navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;
        try {
          const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=celsius`);
          if (!response.ok) {
            throw new Error('Weather service responded with an error.');
          }
          const data = await response.json();
          const weather = data.current_weather;
          if (!weather) {
            throw new Error('No weather data available.');
          }

          const greeting = `Hello! The weather at your location is:`;
          const details = `Temperature: ${weather.temperature.toFixed(1)}°C<br>` +
            `Wind speed: ${weather.windspeed.toFixed(1)} km/h<br>` +
            `Conditions: ${weather.weathercode === 0 ? 'Clear' : weather.weathercode === 1 ? 'Mainly clear' : weather.weathercode === 2 ? 'Partly cloudy' : weather.weathercode === 3 ? 'Overcast' : 'See details'}<br>` +
            `Time: ${weather.time}`;

          weatherEl.innerHTML = `<p>${greeting}</p><p>${details}</p>`;
        } catch (err) {
          errorEl.textContent = err.message;
          weatherEl.innerHTML = '<p>Could not load weather data. Please try again later.</p>';
        }
      }, (geoError) => {
        errorEl.textContent = 'Location access was denied or unavailable.';
        weatherEl.innerHTML = '<p>Please allow location access to view the weather.</p>';
      });
    }

    button.addEventListener('click', showWeather);
  </script>
</body>
</html>
